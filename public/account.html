<!doctype html>
<html lang="en" color-scheme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>freemodel.dev - account</title>
<meta name="theme-color" content="#0d0d0d" />
<style>
  :root {
    --bg: #0d0d0d;
    --panel: #171717;
    --panel-2: #1f1f1f;
    --ink: #f3f4f6;
    --soft: #d1d5db;
    --muted: #9ca3af;
    --line: #2b2b2b;
    --ok: #34d399;
    --warn: #fbbf24;
    --bad: #f87171;
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "Segoe UI", sans-serif;
  }
  a { color: inherit; text-decoration: none; }
  button, input, select {
    font: inherit;
  }
  button {
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--ink);
    border-radius: 8px;
    padding: 9px 12px;
    cursor: pointer;
  }
  button.primary { background: #0b3a25; border-color: #145c3d; color: #d1fae5; }
  button.danger { background: #3f1518; border-color: #6b2028; color: #fecaca; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  input, select {
    width: 100%;
    border: 1px solid var(--line);
    background: #111;
    color: var(--ink);
    border-radius: 8px;
    padding: 9px 10px;
  }
  label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; vertical-align: middle; }
  th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .07em; font-weight: 500; }
  td.actions { width: 1%; white-space: nowrap; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 28px 22px 72px; }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid #202020;
    margin-bottom: 24px;
  }
  .brand { font-size: 16px; font-weight: 600; }
  .brand b { color: var(--ok); }
  .nav { display: flex; gap: 12px; color: var(--muted); font-size: 13px; }
  .grid { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 16px; align-items: start; }
  @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px;
  }
  .panel h1, .panel h2 {
    margin: 0 0 14px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0;
  }
  .stack { display: grid; gap: 12px; }
  .row { display: flex; gap: 8px; align-items: end; }
  .row > * { flex: 1; }
  .row > button { flex: 0 0 auto; }
  .muted { color: var(--muted); }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  .notice {
    display: none;
    border: 1px solid var(--line);
    background: var(--panel-2);
    border-radius: 8px;
    padding: 10px;
    color: var(--soft);
    overflow-wrap: anywhere;
  }
  .notice.show { display: block; }
  .notice.ok { border-color: rgba(52,211,153,.35); }
  .notice.bad { border-color: rgba(248,113,113,.35); color: #fecaca; }
  .meta {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }
  .tile {
    background: var(--panel-2);
    border: 1px solid #252525;
    border-radius: 8px;
    padding: 10px;
  }
  .tile span { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .07em; }
  .tile b { display: block; margin-top: 4px; overflow-wrap: anywhere; font-weight: 500; }
  .wide { grid-column: 1 / -1; }
  .key-form {
    display: grid;
    grid-template-columns: 1.2fr 1.8fr .7fr .7fr auto;
    gap: 8px;
    align-items: end;
    margin-bottom: 14px;
  }
  @media (max-width: 900px) { .key-form { grid-template-columns: 1fr; } }
  .usage-tiles {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin: 10px 0 14px;
  }
  @media (max-width: 760px) { .usage-tiles { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  .usage-tile {
    background: var(--panel-2);
    border: 1px solid #252525;
    border-radius: 8px;
    padding: 10px;
  }
  .usage-tile span { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .07em; }
  .usage-tile b { display: block; margin-top: 4px; font-size: 22px; line-height: 1.1; font-variant-numeric: tabular-nums; }
  .usage-chart-wrap { overflow-x: auto; }
  .usage-chart {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    height: 126px;
    min-width: 680px;
    padding-top: 10px;
    border-bottom: 1px solid var(--line);
  }
  .usage-bar {
    flex: 1 1 0;
    min-width: 8px;
    min-height: 2px;
    border-radius: 3px 3px 0 0;
    background: var(--ok);
    opacity: .84;
    position: relative;
    transition: opacity .2s ease, transform .2s ease;
  }
  .usage-bar.warn { background: var(--warn); }
  .usage-bar.bad { background: var(--bad); }
  .usage-bar.empty { background: var(--line); opacity: .65; height: 2px !important; }
  .usage-bar:hover { opacity: 1; transform: translateY(-2px); }
  .usage-bar:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 6px 8px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
    font-variant-numeric: tabular-nums;
  }
  .usage-axis {
    display: flex;
    justify-content: space-between;
    min-width: 680px;
    color: var(--muted);
    font-size: 11px;
    margin-top: 6px;
  }
  .usage-breakdowns {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
    margin-top: 16px;
  }
  @media (max-width: 760px) { .usage-breakdowns { grid-template-columns: 1fr; } }
  .usage-breakdowns h3 {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    font-weight: 500;
  }
  .usage-mini { display: grid; gap: 7px; }
  .usage-mini-row {
    display: grid;
    grid-template-columns: minmax(120px, 1fr) 2fr 76px;
    gap: 8px;
    align-items: center;
    color: var(--soft);
    font-size: 12px;
    font-variant-numeric: tabular-nums;
  }
  .usage-mini-track {
    height: 8px;
    border: 1px solid #252525;
    border-radius: 999px;
    background: #111;
    overflow: hidden;
  }
  .usage-mini-fill { height: 100%; background: var(--ok); min-width: 2px; }
  .empty { color: var(--muted); padding: 14px 8px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <a class="brand" href="/"><b>freemodel</b>.dev / account</a>
    <nav class="nav">
      <a href="/">status</a>
      <a href="/admin">admin</a>
    </nav>
  </header>

  <main class="grid">
    <section class="panel">
      <h1>Account</h1>
      <div class="stack">
        <div>
          <label for="accountId">Account ID</label>
          <input id="accountId" class="mono" autocomplete="off" />
        </div>
        <div class="row">
          <button id="loadAccount">Load</button>
          <button id="createAccount" class="primary">Create</button>
        </div>
        <div id="notice" class="notice"></div>
        <div id="accountMeta" class="meta hidden">
          <div class="tile"><span>ID</span><b id="metaId" class="mono"></b></div>
          <div class="tile"><span>Created</span><b id="metaCreated"></b></div>
        </div>
        <div id="generatedKeyWrap" class="hidden">
          <label for="generatedKey">Internal API key</label>
          <input id="generatedKey" class="mono" readonly />
        </div>
        <div id="accountActions" class="row hidden">
          <button id="rotateKey">Rotate API key</button>
          <button id="deleteAccount" class="danger">Delete account</button>
        </div>
      </div>
    </section>

    <section id="keysPanel" class="panel hidden">
      <h2>Upstream keys</h2>
      <form id="keyForm" class="key-form">
        <div>
          <label for="keyLabel">Label</label>
          <input id="keyLabel" autocomplete="off" />
        </div>
        <div>
          <label for="apiKey">freemodel.dev API key</label>
          <input id="apiKey" class="mono" type="password" autocomplete="off" />
        </div>
        <div>
          <label for="tier">Tier</label>
          <select id="tier">
            <option value="T2">T2</option>
            <option value="T0">T0</option>
          </select>
        </div>
        <div>
          <label for="priority">Priority</label>
          <input id="priority" type="number" min="0" step="1" value="100" />
        </div>
        <button class="primary" type="submit">Add</button>
      </form>
      <div id="keysTable"></div>
    </section>

    <section id="usagePanel" class="panel wide hidden">
      <h2>Your usage success</h2>
      <div class="muted" id="usageSummary">Load an account to view usage.</div>
      <div class="usage-tiles" id="usageTiles"></div>
      <div class="usage-chart-wrap">
        <div class="usage-chart" id="usageChart" role="img" aria-label="Hourly account success rate"></div>
        <div class="usage-axis" id="usageAxis"></div>
      </div>
      <div class="usage-breakdowns">
        <div>
          <h3>By model</h3>
          <div class="usage-mini" id="usageByModel"></div>
        </div>
        <div>
          <h3>By status</h3>
          <div class="usage-mini" id="usageByStatus"></div>
        </div>
      </div>
    </section>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
let currentAccount = null;

function showNotice(text, type = "ok") {
  const el = $("notice");
  el.textContent = text;
  el.className = `notice show ${type}`;
}

function fmtDate(value) {
  return value ? new Date(value).toLocaleString() : "-";
}

function fmtMs(value) {
  return value == null ? "—" : `${Math.round(value).toLocaleString()} ms`;
}

function fmtPct(value) {
  return value == null ? "—" : `${Number(value).toFixed(value === 100 || value === 0 ? 0 : 1)}%`;
}

async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      "content-type": "application/json",
      ...(options.headers || {}),
    },
  });
  const body = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
  return body;
}

function renderAccount(account, generatedKey = "") {
  currentAccount = account;
  localStorage.setItem("fm_account_id", account.id);
  $("accountId").value = account.id;
  $("metaId").textContent = account.id;
  $("metaCreated").textContent = fmtDate(account.createdAt);
  $("accountMeta").classList.remove("hidden");
  $("accountActions").classList.remove("hidden");
  $("keysPanel").classList.remove("hidden");
  $("usagePanel").classList.remove("hidden");

  if (generatedKey) {
    $("generatedKey").value = generatedKey;
    $("generatedKeyWrap").classList.remove("hidden");
  }

  renderKeys(account.keys || []);
  loadUsage(account.id).catch((err) => {
    $("usageSummary").textContent = `Failed to load usage: ${err.message}`;
  });
}

function renderKeys(keys) {
  if (!keys.length) {
    $("keysTable").innerHTML = `<div class="empty">No upstream keys.</div>`;
    return;
  }

  $("keysTable").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Label</th>
          <th>Key</th>
          <th>Tier</th>
          <th>Priority</th>
          <th>Enabled</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${keys.map((key) => `
          <tr data-key-id="${key.id}">
            <td><input data-field="label" value="${escapeAttr(key.label || "")}" /></td>
            <td class="mono">${escapeHtml(key.keyHint || "-")}</td>
            <td>
              <select data-field="tier">
                <option value="T2" ${key.tier === "T2" ? "selected" : ""}>T2</option>
                <option value="T0" ${key.tier === "T0" ? "selected" : ""}>T0</option>
              </select>
            </td>
            <td><input data-field="priority" type="number" min="0" step="1" value="${Number(key.priority ?? 100)}" /></td>
            <td><input data-field="enabled" type="checkbox" ${key.enabled ? "checked" : ""} /></td>
            <td class="actions">
              <button data-action="save">Save</button>
              <button data-action="delete" class="danger">Delete</button>
            </td>
          </tr>
        `).join("")}
      </tbody>
    </table>`;
}

function escapeHtml(value) {
  return String(value ?? "").replace(/[&<>"']/g, (ch) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    "\"": "&quot;",
    "'": "&#39;",
  }[ch]));
}

function escapeAttr(value) {
  return escapeHtml(value).replace(/"/g, "&quot;");
}

function rateTone(rate) {
  if (rate == null) return "empty";
  if (rate < 80) return "bad";
  if (rate < 95) return "warn";
  return "";
}

async function loadUsage(accountId) {
  const data = await api(`/api/accounts/${encodeURIComponent(accountId)}/usage`);
  renderUsage(data);
}

function renderUsage(data) {
  const s = data.summary || {};
  const officialT2 = data.official?.t2 || {};
  const total = s.total || 0;
  const delta = s.successRate != null && officialT2.successRate != null
    ? s.successRate - officialT2.successRate
    : null;
  const deltaText = delta == null ? "" : ` · ${delta >= 0 ? "+" : ""}${delta.toFixed(1)} pts vs official api-cc`;
  $("usageSummary").textContent = total
    ? `Last ${data.windowHours || 24}h · ${s.ok.toLocaleString()} / ${total.toLocaleString()} requests completed successfully${deltaText}${s.lastCompletedAt ? ` · latest ${fmtDate(s.lastCompletedAt)}` : ""}`
    : `No proxy usage recorded for this account in the last ${data.windowHours || 24}h.`;

  $("usageTiles").innerHTML = [
    ["Your success", fmtPct(s.successRate), `${s.ok || 0} ok · ${s.failed || 0} failed`],
    ["Official api-cc", fmtPct(officialT2.successRate), `${officialT2.ok || 0} / ${officialT2.total || 0} probes ok`],
    ["Requests", (total || 0).toLocaleString(), "last 24h"],
    ["Avg latency", fmtMs(s.avgLatencyMs), s.avgAttempts == null ? "completed requests" : `${s.avgAttempts} attempts avg`],
  ].map(([label, value, sub]) => `
    <div class="usage-tile">
      <span>${escapeHtml(label)}</span>
      <b>${escapeHtml(value)}</b>
      <div class="muted">${escapeHtml(sub)}</div>
    </div>
  `).join("");

  renderUsageChart(data.buckets || []);
  renderMiniBars("usageByModel", data.byModel || [], "model");
  renderMiniBars("usageByStatus", data.byStatus || [], "status");
}

function renderUsageChart(buckets) {
  if (!buckets.length || buckets.every((bucket) => !bucket.total)) {
    $("usageChart").innerHTML = `<div class="empty">No usage samples yet.</div>`;
    $("usageAxis").innerHTML = "";
    return;
  }

  $("usageChart").innerHTML = buckets.map((bucket) => {
    const rate = bucket.successRate;
    const height = rate == null ? 2 : Math.max(2, Math.round(rate));
    const tip = `${fmtPct(rate)} · ${bucket.ok}/${bucket.total} ok · ${fmtMs(bucket.avgLatencyMs)} · ${new Date(bucket.ts).toLocaleTimeString([], { hour: "numeric" })}`;
    return `<span class="usage-bar ${rateTone(rate)}" style="height:${height}%" data-tip="${escapeAttr(tip)}"></span>`;
  }).join("");

  const first = buckets[0]?.ts;
  const mid = buckets[Math.floor(buckets.length / 2)]?.ts;
  const last = buckets[buckets.length - 1]?.ts;
  $("usageAxis").innerHTML = [first, mid, last]
    .filter(Boolean)
    .map((ts) => `<span>${new Date(ts).toLocaleTimeString([], { hour: "numeric" })}</span>`)
    .join("");
}

function renderMiniBars(id, rows, labelKey) {
  if (!rows.length) {
    $(id).innerHTML = `<div class="empty">No data.</div>`;
    return;
  }
  const max = Math.max(1, ...rows.map((row) => row.total || 0));
  $(id).innerHTML = rows.map((row) => {
    const label = labelKey === "status" ? `HTTP ${row.status || "network"}` : row.model;
    const width = Math.max(2, Math.round(((row.total || 0) / max) * 100));
    return `
      <div class="usage-mini-row">
        <span class="mono">${escapeHtml(label)}</span>
        <span class="usage-mini-track"><span class="usage-mini-fill" style="width:${width}%"></span></span>
        <span>${fmtPct(row.successRate)}</span>
      </div>
    `;
  }).join("");
}

async function loadAccount(id = $("accountId").value.trim()) {
  if (!id) return;
  const body = await api(`/api/accounts/${encodeURIComponent(id)}`);
  renderAccount(body.account);
  showNotice("Account loaded.");
}

$("createAccount").addEventListener("click", async () => {
  try {
    const body = await api("/api/accounts", { method: "POST", body: "{}" });
    renderAccount(body.account, body.apiKey);
    showNotice("Account created.");
  } catch (err) {
    showNotice(err.message, "bad");
  }
});

$("loadAccount").addEventListener("click", () => {
  loadAccount().catch((err) => showNotice(err.message, "bad"));
});

$("rotateKey").addEventListener("click", async () => {
  if (!currentAccount) return;
  try {
    const body = await api(`/api/accounts/${encodeURIComponent(currentAccount.id)}/api-key`, {
      method: "POST",
      body: "{}",
    });
    $("generatedKey").value = body.apiKey;
    $("generatedKeyWrap").classList.remove("hidden");
    showNotice("API key rotated.");
  } catch (err) {
    showNotice(err.message, "bad");
  }
});

$("deleteAccount").addEventListener("click", async () => {
  if (!currentAccount) return;
  if (!confirm(`Delete ${currentAccount.id}?`)) return;
  try {
    await api(`/api/accounts/${encodeURIComponent(currentAccount.id)}`, { method: "DELETE" });
    localStorage.removeItem("fm_account_id");
    currentAccount = null;
    $("accountMeta").classList.add("hidden");
    $("accountActions").classList.add("hidden");
    $("keysPanel").classList.add("hidden");
    $("usagePanel").classList.add("hidden");
    $("generatedKeyWrap").classList.add("hidden");
    showNotice("Account deleted.");
  } catch (err) {
    showNotice(err.message, "bad");
  }
});

$("keyForm").addEventListener("submit", async (event) => {
  event.preventDefault();
  if (!currentAccount) return;
  try {
    const body = await api(`/api/accounts/${encodeURIComponent(currentAccount.id)}/keys`, {
      method: "POST",
      body: JSON.stringify({
        label: $("keyLabel").value,
        apiKey: $("apiKey").value,
        tier: $("tier").value,
        priority: $("priority").value,
      }),
    });
    $("keyLabel").value = "";
    $("apiKey").value = "";
    renderAccount(body.account);
    showNotice("Upstream key added.");
  } catch (err) {
    showNotice(err.message, "bad");
  }
});

$("keysTable").addEventListener("click", async (event) => {
  const button = event.target.closest("button");
  if (!button || !currentAccount) return;
  const row = button.closest("tr");
  const keyId = row?.dataset.keyId;
  if (!keyId) return;

  try {
    if (button.dataset.action === "delete") {
      const body = await api(`/api/accounts/${encodeURIComponent(currentAccount.id)}/keys/${encodeURIComponent(keyId)}`, {
        method: "DELETE",
      });
      renderAccount(body.account);
      showNotice("Upstream key deleted.");
      return;
    }

    const body = await api(`/api/accounts/${encodeURIComponent(currentAccount.id)}/keys/${encodeURIComponent(keyId)}`, {
      method: "PATCH",
      body: JSON.stringify({
        label: row.querySelector("[data-field='label']").value,
        tier: row.querySelector("[data-field='tier']").value,
        priority: row.querySelector("[data-field='priority']").value,
        enabled: row.querySelector("[data-field='enabled']").checked,
      }),
    });
    renderAccount(body.account);
    showNotice("Upstream key saved.");
  } catch (err) {
    showNotice(err.message, "bad");
  }
});

const remembered = localStorage.getItem("fm_account_id");
if (remembered) {
  $("accountId").value = remembered;
  loadAccount(remembered).catch(() => {});
}
</script>
</body>
</html>
