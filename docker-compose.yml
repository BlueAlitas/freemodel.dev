# freemodel.dev status page
# Drop into Dokploy as a "Docker Compose" service.
# Domain: fm.bluealitas.com — auto-TLS via Dokploy's Traefik (letsencrypt).
#
# Required env (set in Dokploy → Environment):
#   DATABASE_URL         Postgres connection string.
#   FREEMODEL_TOKEN      Bearer token for the cc.freemodel.dev probes.
#   ADMIN_TOKEN          Token for /api/admin/* access.

services:
  status:
    build:
      context: .
      dockerfile: Dockerfile
    image: freemodel-status:latest
    container_name: freemodel-status
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      FREEMODEL_TOKEN: ${FREEMODEL_TOKEN:-}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
      TARGET_URLS: ${TARGET_URLS:-https://cc.freemodel.dev,https://api-cc.freemodel.dev}
      PROXY_T2_URL: ${PROXY_T2_URL:-https://api-cc.freemodel.dev}
      PROXY_T0_URL: ${PROXY_T0_URL:-https://cc.freemodel.dev}
      PROXY_RETRIES_PER_CREDENTIAL: ${PROXY_RETRIES_PER_CREDENTIAL:-10}
      PROXY_BODY_LIMIT: ${PROXY_BODY_LIMIT:-20mb}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      PROXY_KEY_SECRET: ${PROXY_KEY_SECRET:-}
      TEST_MODELS: ${TEST_MODELS:-claude-haiku-4-5-20251001}
      INTERVAL_HEALTHY_MS: ${INTERVAL_HEALTHY_MS:-1800000}
      INTERVAL_RETRY_MS: ${INTERVAL_RETRY_MS:-60000}
      MODEL_REFRESH_MS: ${MODEL_REFRESH_MS:-21600000}
      TRACK_PATHS: ${TRACK_PATHS:-/}
      ACTIVE_WINDOW_MIN: ${ACTIVE_WINDOW_MIN:-5}
    networks:
      - dokploy-network
    labels:
      # ─── Traefik core ────────────────────────────────────────
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"

      # ─── HTTPS router (fm.bluealitas.com) ───────────────────
      - "traefik.http.routers.fm-bluealitas.rule=Host(`fm.bluealitas.com`)"
      - "traefik.http.routers.fm-bluealitas.entrypoints=websecure"
      - "traefik.http.routers.fm-bluealitas.tls=true"
      - "traefik.http.routers.fm-bluealitas.tls.certresolver=letsencrypt"
      - "traefik.http.routers.fm-bluealitas.service=fm-bluealitas-svc"

      # ─── HTTP → HTTPS redirect ──────────────────────────────
      - "traefik.http.routers.fm-bluealitas-http.rule=Host(`fm.bluealitas.com`)"
      - "traefik.http.routers.fm-bluealitas-http.entrypoints=web"
      - "traefik.http.routers.fm-bluealitas-http.middlewares=redirect-to-https@docker"
      - "traefik.http.routers.fm-bluealitas-http.service=fm-bluealitas-svc"

      # ─── Service (load balancer) ────────────────────────────
      - "traefik.http.services.fm-bluealitas-svc.loadbalancer.server.port=3000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  dokploy-network:
    external: true
    name: dokploy-network
